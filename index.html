Put your HTML text here<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>POKOPIA 18x18 寶貝球 3D 施工藍圖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: row; height: 100vh; overflow: hidden; background: #222; color: white; }
        #canvas-container { flex: 1; position: relative; }
        #info-panel { width: 350px; background: #333; overflow-y: auto; padding: 20px; border-left: 2px solid #444; }
        .layer-item { margin-bottom: 15px; padding: 10px; background: #444; border-radius: 5px; }
        .grid-mini { display: grid; grid-template-columns: repeat(18, 5px); gap: 1px; margin-top: 5px; }
        .cell { width: 5px; height: 5px; background: #555; }
        .cell.r { background: #ff4b4b; }
        .cell.b { background: #000; }
        .cell.w { background: #fff; }
        h2 { color: #ffeb3b; font-size: 1.2rem; }
        .controls-hint { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div id="canvas-container">
    <div class="controls-hint">
        操作說明：<br>
        🖱️ 左鍵：旋轉視角<br>
        🖱️ 右鍵：平移<br>
        🔄 滾輪：縮放
    </div>
</div>

<div id="info-panel">
    <h2>施工數據說明</h2>
    <p>直徑：18 格<br>中心點：(9, 9, 9)</p>
    <hr>
    <div id="layer-list"></div>
</div>

<script>
    // --- Three.js 3D 渲染部分 ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(25, 25, 25);
    
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);
    
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    
    // 燈光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const R = 9;
    const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95); // 稍微縮小一點點，讓方塊間有細縫感
    
    // 生成球體方塊
    for (let z = 0; z < 18; z++) {
        for (let y = 0; y < 18; y++) {
            for (let x = 0; x < 18; x++) {
                // 調整座標到中心
                const dx = x - 8.5;
                const dy = y - 8.5;
                const dz = z - 8.5;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                
                if (dist <= R) {
                    let color = 0xffffff;
                    
                    // 顏色邏輯
                    if (y >= 10) color = 0xff4b4b; // 紅色頂部
                    else if (y >= 8) color = 0x333333; // 黑色腰帶
                    else color = 0xeeeeee; // 白色底部
                    
                    // 按鈕邏輯 (正前方)
                    if (z > 7 && Math.sqrt(dx*dx + (y-9)*(y-9)) <= 3) {
                        if (Math.sqrt(dx*dx + (y-9)*(y-9)) <= 2) color = 0xffffff; // 按鈕白芯
                        else color = 0x333333; // 按鈕黑框
                    }

                    const material = new THREE.MeshLambertMaterial({ color: color });
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.set(dx, dy, dz);
                    scene.add(cube);
                }
            }
        }
    }

    // --- 右側 2D 分層列表生成 ---
    const layerList = document.getElementById('layer-list');
    for (let y = 17; y >= 0; y--) {
        const layerItem = document.createElement('div');
        layerItem.className = 'layer-item';
        let layerColorText = y >= 10 ? "紅色層" : (y >= 8 ? "黑色層" : "白色層");
        layerItem.innerHTML = `<strong>第 ${y+1} 層 (${layerColorText})</strong>`;
        
        const grid = document.createElement('div');
        grid.className = 'grid-mini';
        
        const dy = y - 8.5;
        const current_r = Math.sqrt(Math.pow(R, 2) - Math.pow(dy, 2));
        
        for (let dz = -8.5; dz <= 8.5; dz++) {
            for (let dx = -8.5; dx <= 8.5; dx++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (Math.sqrt(dx*dx + dz*dz) <= current_r) {
                    if (y >= 10) cell.classList.add('r');
                    else if (y >= 8) cell.classList.add('b');
                    else cell.classList.add('w');
                }
                grid.appendChild(cell);
            }
        }
        layerItem.appendChild(grid);
        layerList.appendChild(layerItem);
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
</script>
</body>
</html>
